<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subir a Nutri PRO · NutriPlant</title>
  <link rel="icon" type="image/png" href="../assets/N_Hoja_Azul.png" />
  <script src="../app-config.js"></script>
  <script src="../supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(160deg, #ecfdf5 0%, #f8fafc 45%, #fff 100%);
      color: #0f172a;
      min-height: 100vh;
      padding: 20px 16px 32px;
    }
    .wrap { max-width: 440px; margin: 0 auto; }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .brand img { width: 36px; height: 36px; object-fit: contain; }
    h1 { font-size: 20px; margin: 0; }
    .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
    .card {
      background: #fff;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    .folder {
      padding: 10px 12px;
      border-radius: 10px;
      background: #ecfdf5;
      border: 1px solid rgba(5, 150, 105, 0.25);
      font-size: 14px;
      font-weight: 700;
      color: #047857;
      margin-bottom: 14px;
    }
    .hint { font-size: 13px; color: #475569; line-height: 1.5; margin-bottom: 14px; }
    input[type="file"] {
      width: 100%;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, #059669, #047857);
      color: #fff;
    }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost {
      margin-top: 10px;
      background: #fff;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .status {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.5;
      padding: 10px 12px;
      border-radius: 10px;
      display: none;
    }
    .status.ok { display: block; background: #ecfdf5; color: #047857; border: 1px solid rgba(5, 150, 105, 0.25); }
    .status.err { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .status.wait { display: block; background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }
    .login-box { text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="../assets/N_Hoja_Azul.png" alt="" />
      <div>
        <h1>Subir a Nutri PRO</h1>
        <div class="sub">Enlace desde tu GPT Socio</div>
      </div>
    </div>
    <div class="card" id="mainCard">
      <div id="loading" class="status wait">Validando enlace…</div>
      <div id="loginBox" class="login-box" style="display:none;">
        <p class="hint">Inicia sesión como admin para subir el archivo a la nube.</p>
        <button type="button" class="btn btn-primary" id="btnLogin">Ir a iniciar sesión</button>
      </div>
      <div id="uploadBox" style="display:none;">
        <div class="folder" id="folderLabel">Carpeta…</div>
        <p class="hint" id="hintText">Selecciona el PDF, Excel u otro archivo. Se guardará en Nutri PRO e indexará el texto.</p>
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.rtf,.odt,.ods,.odp,image/*" />
        <button type="button" class="btn btn-primary" id="btnUpload" disabled>Subir a Nutri PRO</button>
        <button type="button" class="btn btn-ghost" id="btnPlanPro">Abrir Plan PRO</button>
        <div id="result" class="status"></div>
      </div>
    </div>
  </div>
  <script>
(function () {
  'use strict';
  var NP_BUCKET = 'plan-pro-nutri-pro';
  var ticket = '';
  var ticketData = null;
  var selectedFile = null;

  function $(id) { return document.getElementById(id); }
  function apiBase() {
    return (window.getNutriPlantApiBase && window.getNutriPlantApiBase()) || window.location.origin;
  }
  function qp(name) {
    return new URLSearchParams(window.location.search).get(name) || '';
  }
  function showStatus(el, kind, text) {
    el.className = 'status ' + kind;
    el.textContent = text;
    el.style.display = 'block';
  }
  function sanitizeName(name) {
    var base = String(name || 'archivo').trim().replace(/[/\\?%*:|"<>]/g, '_');
    return base.length > 180 ? base.slice(0, 180) : base;
  }
  function uuid() {
    if (crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
      var r = (Math.random() * 16) | 0;
      return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
    });
  }
  function fileAllowed(file) {
    if (!file || !file.name) return false;
    return /\.(pdf|doc|docx|xls|xlsx|ppt|pptx|txt|csv|rtf|odt|ods|odp|png|jpe?g|webp|gif|bmp|tiff?|heic|heif|svg)$/i.test(file.name) || /^image\//.test(file.type || '');
  }

  async function loadTicket() {
    ticket = qp('t') || qp('ticket') || '';
    if (!ticket) {
      showStatus($('loading'), 'err', 'Falta el enlace (ticket). Pide uno nuevo a tu GPT.');
      return;
    }
    try {
      var res = await fetch(apiBase() + '/api/nutri-pro-upload?ticket=' + encodeURIComponent(ticket));
      var data = await res.json();
      if (!data.ok) {
        showStatus($('loading'), 'err', data.error || 'Enlace inválido o expirado.');
        return;
      }
      ticketData = data;
      $('loading').style.display = 'none';
      if (data.status === 'done') {
        $('uploadBox').style.display = 'block';
        $('folderLabel').textContent = '📁 ' + (data.folder_path || 'Nutri PRO');
        showStatus($('result'), 'ok', 'Ya estaba subido: ' + (data.filename || data.short_path || 'archivo') + '. Vuelve al GPT y di «ya subí».');
        $('btnUpload').disabled = true;
        return;
      }
      $('uploadBox').style.display = 'block';
      $('folderLabel').textContent = '📁 ' + (data.folder_path || 'Nutri PRO');
      if (data.title_hint) $('hintText').textContent = data.title_hint;
      await ensureSession();
    } catch (e) {
      showStatus($('loading'), 'err', 'No se pudo validar el enlace. Revisa conexión.');
    }
  }

  async function ensureSession() {
    var client = window.getSupabaseClient && window.getSupabaseClient();
    if (!client) {
      $('loginBox').style.display = 'block';
      return;
    }
    var sess = await client.auth.getSession();
    var token = sess && sess.data && sess.data.session && sess.data.session.access_token;
    if (!token) {
      $('loginBox').style.display = 'block';
      return;
    }
    var prof = await client.from('profiles').select('is_admin').eq('id', sess.data.session.user.id).maybeSingle();
    if (prof.error || !prof.data || !prof.data.is_admin) {
      showStatus($('result'), 'err', 'Solo administrador puede subir a Nutri PRO.');
      return;
    }
    $('loginBox').style.display = 'none';
    $('btnUpload').disabled = !selectedFile;
  }

  async function uploadFile() {
    if (!selectedFile || !ticketData) return;
    var client = window.getSupabaseClient && window.getSupabaseClient();
    if (!client) return;
    var sess = await client.auth.getSession();
    var session = sess && sess.data && sess.data.session;
    if (!session) {
      $('loginBox').style.display = 'block';
      return;
    }
    var userId = session.user.id;
    var token = session.access_token;
    var btn = $('btnUpload');
    btn.disabled = true;
    showStatus($('result'), 'wait', 'Subiendo…');

    var safeName = sanitizeName(selectedFile.name);
    var fileId = uuid();
    var folderId = ticketData.folder_id || null;
    var folderSeg = folderId || 'root';
    var path = userId + '/' + folderSeg + '/' + fileId + '/' + safeName;

    var up = await client.storage.from(NP_BUCKET).upload(path, selectedFile, {
      contentType: selectedFile.type || 'application/octet-stream',
      upsert: false
    });
    if (up.error) {
      showStatus($('result'), 'err', up.error.message || 'Error al subir.');
      btn.disabled = false;
      return;
    }

    var ins = await client.from('plan_pro_nutri_files').insert({
      id: fileId,
      owner_id: userId,
      folder_id: folderId,
      title: safeName.replace(/\.[^.]+$/, '') || safeName,
      original_name: safeName,
      storage_path: path,
      mime_type: selectedFile.type || null,
      size_bytes: selectedFile.size || 0
    }).select('id').single();

    if (ins.error) {
      try { await client.storage.from(NP_BUCKET).remove([path]); } catch (e) {}
      showStatus($('result'), 'err', ins.error.message || 'Error al registrar.');
      btn.disabled = false;
      return;
    }

    try {
      await fetch(apiBase() + '/api/nutri-pro-extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ file_id: fileId })
      });
    } catch (eEx) {}

    try {
      await fetch(apiBase() + '/api/nutri-pro-upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ ticket: ticket, file_id: fileId, filename: safeName })
      });
    } catch (eDone) {}

    showStatus(
      $('result'),
      'ok',
      '✓ Guardado en ' + (ticketData.folder_path || 'Nutri PRO') + ' › ' + safeName + '. Vuelve al GPT y di «ya subí».'
    );
  }

  $('fileInput').addEventListener('change', function (e) {
    var f = e.target.files && e.target.files[0];
    selectedFile = f && fileAllowed(f) ? f : null;
    if (f && !selectedFile) showStatus($('result'), 'err', 'Tipo de archivo no permitido.');
    $('btnUpload').disabled = !selectedFile;
  });
  $('btnUpload').addEventListener('click', uploadFile);
  $('btnLogin').addEventListener('click', function () {
    try {
      sessionStorage.setItem('np_nutri_upload_return', window.location.href);
    } catch (e) {}
    window.location.href = '../login.html';
  });
  try {
    if (sessionStorage.getItem('np_nutri_upload_return') === window.location.href) {
      sessionStorage.removeItem('np_nutri_upload_return');
    }
  } catch (e) {}
  $('btnPlanPro').addEventListener('click', function () {
    window.location.href = 'index.html';
  });

  loadTicket();
})();
  </script>
</body>
</html>
