<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Enmienda | NutriPlant PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:system-ui;
  background:#f4f6fb;
  margin:0;
  padding:20px
}
.card{
  background:#fff;
  border-radius:14px;
  padding:18px;
  max-width:1200px;
  margin:auto
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px
}
input{
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
  width:100%
}
button{
  padding:10px;
  border-radius:10px;
  border:0;
  cursor:pointer
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px
}
th,td{
  border-bottom:1px solid #eee;
  padding:6px;
  text-align:center;
  font-size:13px
}
.hidden{display:none}
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  opacity:0
}
#toast.show{opacity:1}
</style>
</head>

<body>
<div class="card">
<h2>Calculadora de Enmiendas</h2>

   <div class="grid">
  <input id="K" placeholder="K (meq/100g)">
  <input id="Ca" placeholder="Ca (meq/100g)">
  <input id="Mg" placeholder="Mg (meq/100g)">
  <input id="H" placeholder="H">
  <input id="Na" placeholder="Na">
  <input id="Al" placeholder="Al">
</div>

<p>CIC total: <strong id="cicTotal">0.00</strong></p>

<button id="btnCalc">Calcular</button>
<button id="btnReset">Reset</button>

<div id="resultsBox" class="hidden">
  <h3>Resultado</h3>
  <ul id="totalsList"></ul>
</div>

<h3>Enmiendas</h3>
<table>
<thead>
<tr>
  <th>Nombre</th>
  <th>Fórmula</th>
  <th>Acciones</th>
</tr>
</thead>
<tbody id="amendBody"></tbody>
</table>

<p id="saveState"></p>
<div id="toast"></div>
</div>

   <script>
(() => {

const ionIds = ["K","Ca","Mg","H","Na","Al"];

const TARGETS = { K:0.05, Ca:0.75, Mg:0.15 };

const AW  = { K:39.1, Ca:40.1, Mg:24.3 };
const VAL = { K:1, Ca:2, Mg:2 };

const DEFAULT_AMENDMENTS = [
  { id:"gypsum", name:"Yeso Agrícola", formula:"CaSO₄·2H₂O", pctCa:23.3 },
  { id:"lime", name:"Cal Agrícola", formula:"CaCO₃", pctCa:40 },
  { id:"dolomite", name:"Cal Dolomítica", formula:"CaCO₃ + MgCO₃", pctCa:21.7, pctMg:13.2 }
];

const $ = (id)=>document.getElementById(id);
const n = v => Number.isFinite(parseFloat(v)) ? parseFloat(v) : 0;
const fmt = (x,d=2)=>Number(x||0).toFixed(d);

let amendments = structuredClone(DEFAULT_AMENDMENTS);
let selectedAmendId = amendments[0].id;

function calcCIC(v){
  return ionIds.reduce((s,i)=>s+n(v[i]),0);
}

function getIonValues(){
  const v={};
  ionIds.forEach(i=>v[i]=n($(i).value));
  return v;
}

 function renderAmendments(){
  const tbody=$("amendBody");
  tbody.innerHTML="";
  amendments.forEach(a=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${a.name}</td>
      <td>${a.formula}</td>
      <td>
        <button onclick="selectAmend('${a.id}')">Usar</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

window.selectAmend = id => {
  selectedAmendId=id;
};

function calculate(){
  const v=getIonValues();
  const cic=calcCIC(v);
  $("cicTotal").textContent=fmt(cic);

  const a=amendments.find(x=>x.id===selectedAmendId);
  if(!a) return;

  $("totalsList").innerHTML=`
    <li>Enmienda seleccionada: ${a.name}</li>
  `;
  $("resultsBox").classList.remove("hidden");
}

$("btnCalc").onclick=calculate;
$("btnReset").onclick=()=>location.reload();

renderAmendments();

})();
</script>

</body>
</html>
