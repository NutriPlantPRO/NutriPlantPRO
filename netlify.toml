# NutriPlant PRO - Netlify
# Publicar: carpeta raíz (.)
# La API de OpenAI se sirve como función serverless (la clave va en variables de entorno).

[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[functions]
  # EE es pesado: incluir desde node_modules en el zip de la función (evita fallos del bundler).
  external_node_modules = ["@google/earthengine", "googleapis"]

# Límite de ejecución (s). En Netlify el tope por plan puede ser <60s (p. ej. starter) o hasta 60s+ según cuenta;
# si el deploy no acepta un valor, baja el número o configúralo en el panel: Site → Functions.
[functions."radar-ndvi"]
  timeout = 60

[[redirects]]
  from = "/api/openai-assistant"
  to = "/.netlify/functions/openai-assistant"
  status = 200
  force = true

[[redirects]]
  from = "/api/paypal-config"
  to = "/.netlify/functions/paypal-config"
  status = 200
  force = true

[[redirects]]
  from = "/api/report-view"
  to = "/.netlify/functions/report-view"
  status = 200
  force = true

[[redirects]]
  from = "/api/radar-ndvi"
  to = "/.netlify/functions/radar-ndvi"
  status = 200
  force = true
