# NutriPlant PRO - Netlify
# Publicar: carpeta raíz (.)
# La API de OpenAI se sirve como función serverless (la clave va en variables de entorno).

[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[functions]
  # EE es pesado: incluir desde node_modules en el zip de la función (evita fallos del bundler).
  external_node_modules = ["@google/earthengine", "googleapis"]

# Límite de ejecución (s). En Netlify el tope por plan puede ser <60s (p. ej. starter) o hasta 60s+ según cuenta;
# si el deploy no acepta un valor, baja el número o configúralo en el panel: Site → Functions.
[functions."radar-ndvi"]
  timeout = 60

[functions."radar-cdse-pilot"]
  timeout = 26
  external_node_modules = ["geotiff", "sharp", "proj4"]

[functions."radar-cdse-pilot-background"]
  timeout = 900
  external_node_modules = ["geotiff", "sharp", "proj4"]

[functions."nutri-pro-extract"]
  timeout = 60
  external_node_modules = ["pdf-parse", "xlsx", "mammoth", "jszip"]

[functions."nutriplant-admin-assistant"]
  timeout = 26

# Inicio: por defecto ir a login (la mayoría de equipos)
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 302

# Si /index.html se abre sin pasar por la regla anterior, index.html redirige por JS/meta
# y muestra la portada (logo + Manual + Iniciar sesión) como respaldo

# Manual técnico: servir index explícito (evita bucle 301 /manual-tecnico/ → /manual-tecnico/)
[[redirects]]
  from = "/manual-tecnico"
  to = "/manual-tecnico/index.html"
  status = 301

[[redirects]]
  from = "/manual-tecnico/nosotros.html"
  to = "/manual-tecnico/autoria.html"
  status = 301

[[redirects]]
  from = "/api/openai-assistant"
  to = "/.netlify/functions/openai-assistant"
  status = 200
  force = true

